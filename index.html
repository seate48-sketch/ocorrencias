<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4a90c4">
    <meta name="description" content="Sistema para supervisor controlar ausências de colaboradores">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Ausências">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
    <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">

    <title>Controle de Ausências</title>

    <style>
        /* =========================================================
           RESET & BASE
        ========================================================= */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --cor-primaria: #4a90c4;
            --cor-perigo: #c44a4a;
            --cor-sucesso: #28a745;
            --cor-aviso: #ffc107;
            --cor-fundo: #e8edf2;
            --cor-card: #ffffff;
            --cor-borda: #dde3ea;
            --cor-texto: #2c3e50;
            --cor-texto-suave: #6c757d;
            --raio: 10px;
            --sombra: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--cor-fundo);
            color: var(--cor-texto);
            padding: 12px;
            padding-bottom: env(safe-area-inset-bottom, 80px);
            min-height: 100dvh;
        }

        /* =========================================================
           LAYOUT PRINCIPAL
        ========================================================= */
        .container {
            max-width: 680px;
            margin: 0 auto;
            background: var(--cor-card);
            border-radius: var(--raio);
            box-shadow: var(--sombra);
            overflow: hidden;
            padding: 16px;
        }

        h1 {
            font-size: clamp(18px, 5vw, 24px);
            color: var(--cor-texto);
            margin-bottom: 14px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--cor-texto);
            margin-bottom: 10px;
        }

        /* =========================================================
           BARRA DE STATUS
        ========================================================= */
        .status {
            background: var(--cor-aviso);
            color: #5a4000;
            padding: 8px 12px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            border-radius: var(--raio);
            margin-bottom: 12px;
            transition: background 0.3s, color 0.3s;
        }

        .status.online {
            background: var(--cor-sucesso);
            color: #ffffff;
        }

        .status.offline {
            background: var(--cor-perigo);
            color: #ffffff;
        }

        /* =========================================================
           BARRA DE FERRAMENTAS
        ========================================================= */
        .barra-ferramentas {
            background: #f0f4f8;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: var(--raio);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .barra-ferramentas label {
            font-size: 14px;
            font-weight: 600;
            color: var(--cor-texto-suave);
            white-space: nowrap;
        }

        select {
            padding: 10px 12px;
            font-size: 14px;
            border-radius: var(--raio);
            border: 1px solid var(--cor-borda);
            background: white;
            color: var(--cor-texto);
            cursor: pointer;
            flex: 1;
            min-width: 90px;
        }

        select:focus {
            outline: 2px solid var(--cor-primaria);
            outline-offset: 2px;
        }

        /* =========================================================
           BOTÕES
        ========================================================= */
        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            border-radius: var(--raio);
            border: none;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            min-height: 44px; /* touch target mínimo recomendado */
            white-space: nowrap;
        }

        button:active {
            opacity: 0.75;
            transform: scale(0.97);
        }

        button:focus-visible {
            outline: 2px solid var(--cor-primaria);
            outline-offset: 2px;
        }

        .btn-primario {
            background: var(--cor-primaria);
            color: white;
        }

        .btn-sucesso {
            background: var(--cor-sucesso);
            color: white;
        }

        .btn-perigo {
            background: var(--cor-perigo);
            color: white;
        }

        .btn-secundario {
            background: #e9ecef;
            color: var(--cor-texto);
        }

        /* =========================================================
           CALENDÁRIO - GRID DE MESES
        ========================================================= */
        .grid-meses {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card-mes {
            border: 1px solid var(--cor-borda);
            border-radius: var(--raio);
            overflow: hidden;
        }

        .mes-titulo {
            background: #f0f4f8;
            padding: 10px 12px;
            font-weight: 700;
            text-align: center;
            font-size: 14px;
            color: var(--cor-texto);
            letter-spacing: 0.3px;
        }

        .dias-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            font-size: 11px;
        }

        .cabecalho-dia {
            font-weight: 700;
            text-align: center;
            padding: 6px 2px;
            background: #f8f9fa;
            color: var(--cor-texto-suave);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .dia-celula {
            min-height: 68px;
            border: 1px solid #f0f0f0;
            padding: 4px 3px;
            cursor: pointer;
            position: relative;
            transition: background 0.15s;
        }

        .dia-celula:hover {
            background: #f0f7ff;
        }

        .dia-celula:active {
            background: #dceeff;
        }

        .numero-dia {
            font-weight: 700;
            font-size: 11px;
            margin-bottom: 3px;
            color: var(--cor-texto);
            line-height: 1;
        }

        /* =========================================================
           OCORRÊNCIAS NAS CÉLULAS
        ========================================================= */
        .ocorrencia {
            font-size: 9px;
            padding: 2px 3px;
            margin: 2px 0;
            border-radius: 4px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2px;
            line-height: 1.2;
        }

        .ocorrencia-nome {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            min-width: 0;
        }

        .btn-remover {
            background: rgba(0, 0, 0, 0.25);
            border: none;
            color: white;
            border-radius: 50%;
            cursor: pointer;
            width: 16px;
            height: 16px;
            min-height: unset;
            font-size: 9px;
            font-weight: 700;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
            transition: background 0.15s;
        }

        .btn-remover:hover {
            background: rgba(0, 0, 0, 0.45);
        }

        /* =========================================================
           CORES DOS COLABORADORES
        ========================================================= */
        .colab-rosa       { background: #e83e8c; }
        .colab-verde      { background: #28a745; }
        .colab-laranja    { background: #fd7e14; }
        .colab-roxo       { background: #6f42c1; }
        .colab-vermelho   { background: #dc3545; }
        .colab-azul       { background: #4a90c4; }
        .colab-cinza      { background: #6c757d; }
        .colab-marrom     { background: #8b5a2b; }
        .colab-azul-claro { background: #17a2b8; }

        /* =========================================================
           PAINEL LATERAL / LISTAS
        ========================================================= */
        .painel-lateral {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .lista {
            border: 1px solid var(--cor-borda);
            border-radius: var(--raio);
            padding: 14px;
            background: #fafbfc;
        }

        .lista-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 6px;
            border-bottom: 1px solid #f0f0f0;
            gap: 8px;
            flex-wrap: wrap;
        }

        .lista-item:last-child {
            border-bottom: none;
        }

        .lista-item-nome {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            flex: 1;
            min-width: 0;
        }

        .quadrado-cor {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            border-radius: 5px;
            display: inline-block;
        }

        .contador {
            background: var(--cor-primaria);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        .vazio-msg {
            text-align: center;
            padding: 20px;
            color: var(--cor-texto-suave);
            font-size: 14px;
        }

        /* =========================================================
           MODAL
        ========================================================= */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 16px;
            backdrop-filter: blur(2px);
        }

        .modal.aberto {
            display: flex;
        }

        .modal-conteudo {
            background: white;
            width: 100%;
            max-width: 420px;
            padding: 22px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.2s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .modal-conteudo h3 {
            margin-bottom: 16px;
            font-size: 17px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: var(--cor-texto-suave);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--cor-borda);
            border-radius: var(--raio);
            font-size: 15px;
            color: var(--cor-texto);
            background: white;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--cor-primaria);
            box-shadow: 0 0 0 3px rgba(74, 144, 196, 0.15);
        }

        .form-group input[readonly] {
            background: #f5f7f9;
            cursor: default;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 70px;
        }

        .botoes-acoes {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .botoes-acoes button {
            flex: 1;
        }

        /* =========================================================
           SELETOR DE CORES
        ========================================================= */
        .cores-container {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .cor-opcao {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.15s, border-color 0.15s;
        }

        .cor-opcao:hover {
            transform: scale(1.1);
        }

        .cor-opcao.selecionada {
            border-color: var(--cor-texto);
            transform: scale(1.12);
            box-shadow: 0 0 0 2px white inset;
        }

        /* =========================================================
           RESPONSIVIDADE
        ========================================================= */
        @media (max-width: 480px) {
            body {
                padding: 8px;
                padding-bottom: env(safe-area-inset-bottom, 70px);
            }

            .container {
                padding: 12px 10px;
            }

            .barra-ferramentas {
                gap: 6px;
            }

            .barra-ferramentas label {
                width: 100%;
            }

            .barra-ferramentas select,
            .barra-ferramentas button {
                flex: 1;
            }

            .dia-celula {
                min-height: 58px;
                padding: 3px 2px;
            }

            .numero-dia {
                font-size: 10px;
            }

            .ocorrencia {
                font-size: 8px;
                padding: 1px 2px;
            }

            .btn-remover {
                width: 14px;
                height: 14px;
                font-size: 8px;
            }

            .modal-conteudo {
                padding: 16px;
            }
        }

        @media (max-width: 360px) {
            .dias-grid {
                font-size: 10px;
            }

            .dia-celula {
                min-height: 52px;
            }
        }

        /* =========================================================
           ACESSIBILIDADE: PREFERÊNCIA DE MOVIMENTO REDUZIDO
        ========================================================= */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 Controle de Ausências</h1>

    <div id="statusConexao" class="status" role="status" aria-live="polite">Conectando ao banco...</div>

    <div class="barra-ferramentas">
        <label for="selecionarAno">Ano:</label>
        <select id="selecionarAno" aria-label="Selecionar ano">
            <option value="2025">2025</option>
            <option value="2026" selected>2026</option>
            <option value="2027">2027</option>
            <option value="2028">2028</option>
            <option value="2029">2029</option>
            <option value="2030">2030</option>
        </select>
        <button id="btnAtualizar" class="btn-sucesso" aria-label="Atualizar calendário">↻ Atualizar</button>
    </div>

    <div id="agendaMensal" class="grid-meses" role="main" aria-label="Calendário de ausências"></div>

    <div class="painel-lateral">
        <div class="lista">
            <h3>Colaboradores</h3>
            <div id="listaColaboradores"></div>
            <button id="novoColaboradorBtn" class="btn-primario" style="width:100%; margin-top:12px;" aria-label="Adicionar novo colaborador">
                + Novo Colaborador
            </button>
        </div>
        <div class="lista">
            <h3>Solicitações por Colaborador</h3>
            <div id="resumoContagens"></div>
        </div>
    </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitulo">
    <div class="modal-conteudo">
        <h3 id="modalTitulo"></h3>
        <div id="modalCorpo"></div>
        <div class="botoes-acoes">
            <button id="modalCancelar" class="btn-secundario">Cancelar</button>
            <button id="modalSalvar" class="btn-primario">Salvar</button>
        </div>
    </div>
</div>

<script>
    /* =========================================================
       CONFIGURAÇÃO DO SUPABASE
    ========================================================= */
    const SUPABASE_URL     = 'https://yfvjhcjbehytypfjcuvr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmdmpoY2piZWh5dHlwZmpjdXZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2Mzk5OTQsImV4cCI6MjA5NzIxNTk5NH0.ci82K0w4jLqr7whD3LeC3L8bteOphkaR9BnOnwbo_Dw';

    /* =========================================================
       ESTADO DA APLICAÇÃO
    ========================================================= */
    let supabase       = null;
    let colaboradores  = [];
    let ocorrencias    = [];
    let anoAtual       = new Date().getFullYear();
    let corSelecionada = 'colab-azul';

    // Fila de sincronização para operações offline
    let filaSincronizacao = JSON.parse(localStorage.getItem('fila_sync') || '[]');

    /* =========================================================
       UTILITÁRIOS
    ========================================================= */
    function mostrarStatus(msg, tipo = 'normal') {
        const el = document.getElementById('statusConexao');
        el.textContent = msg;
        el.className = tipo === 'online'  ? 'status online'
                     : tipo === 'offline' ? 'status offline'
                     : 'status';
    }

    function salvarFilaSync() {
        localStorage.setItem('fila_sync', JSON.stringify(filaSincronizacao));
    }

    function salvarDadosLocal() {
        localStorage.setItem('sistema_ausencias', JSON.stringify({
            colaboradores,
            ocorrencias
        }));
    }

    function carregarDadosLocal() {
        const saved = localStorage.getItem('sistema_ausencias');
        if (saved) {
            try {
                const dados    = JSON.parse(saved);
                colaboradores  = dados.colaboradores || [];
                ocorrencias    = dados.ocorrencias   || [];
            } catch {
                colaboradores = [];
                ocorrencias   = [];
            }
        }
        renderizarTudo();
        mostrarStatus(
            colaboradores.length === 0
                ? 'Nenhum colaborador — cadastre um'
                : `Modo offline — ${colaboradores.length} colaborador(es)`,
            'offline'
        );
    }

    /* =========================================================
       INICIALIZAÇÃO E SUPABASE
    ========================================================= */
    async function init() {
        // Definir o ano atual no select
        const selectAno = document.getElementById('selecionarAno');
        selectAno.value = anoAtual;
        if (!selectAno.value) {
            // Ano não está nas opções; adicionar dinamicamente
            const opt = document.createElement('option');
            opt.value = anoAtual;
            opt.textContent = anoAtual;
            selectAno.prepend(opt);
            selectAno.value = anoAtual;
        }

        mostrarStatus('Conectando...', 'normal');

        try {
            const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
            supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            await carregarDados();

            // Tentar sincronizar operações pendentes
            await sincronizarFila();
        } catch (error) {
            console.error('Erro na inicialização:', error);
            mostrarStatus('Sem conexão — carregando dados locais', 'offline');
            carregarDadosLocal();
        }
    }

    async function carregarDados() {
        try {
            const [{ data: cols, error: errCols }, { data: occs, error: errOccs }] = await Promise.all([
                supabase.from('colaboradores').select('*').order('id'),
                supabase.from('ocorrencias').select('*').order('data')
            ]);

            if (errCols)  throw errCols;
            if (errOccs)  throw errOccs;

            colaboradores = cols || [];
            ocorrencias   = (occs || []).map(occ => ({
                id:            occ.id,
                data:          occ.data,
                colaboradorId: occ.colaborador_id,
                motivo:        occ.motivo
            }));

            salvarDadosLocal();
            renderizarTudo();
            mostrarStatus(`Conectado — ${colaboradores.length} colaborador(es)`, 'online');

        } catch (error) {
            console.error('Erro ao carregar dados:', error);
            mostrarStatus('Erro ao carregar — usando dados locais', 'offline');
            carregarDadosLocal();
        }
    }

    /* =========================================================
       FILA DE SINCRONIZAÇÃO (OFFLINE → ONLINE)
    ========================================================= */
    async function sincronizarFila() {
        if (!supabase || filaSincronizacao.length === 0) return;

        const pendentes = [...filaSincronizacao];
        filaSincronizacao = [];
        salvarFilaSync();

        for (const op of pendentes) {
            try {
                if (op.tipo === 'inserir_ocorrencia') {
                    const { data: nova, error } = await supabase
                        .from('ocorrencias')
                        .insert([{ data: op.data, colaborador_id: op.colaboradorId, motivo: op.motivo }])
                        .select()
                        .single();
                    if (!error && nova) {
                        // Substituir o ID temporário pelo ID real
                        const idx = ocorrencias.findIndex(o => o.id === op.idTemp);
                        if (idx !== -1) {
                            ocorrencias[idx].id = nova.id;
                        }
                    }
                } else if (op.tipo === 'excluir_ocorrencia' && typeof op.id === 'number') {
                    await supabase.from('ocorrencias').delete().eq('id', op.id);
                }
            } catch (e) {
                console.warn('Falha ao sincronizar operação:', op, e);
                filaSincronizacao.push(op); // Recolocar na fila se falhar
            }
        }

        salvarFilaSync();
        salvarDadosLocal();
        renderizarTudo();
    }

    /* =========================================================
       OCORRÊNCIAS — CRUD
    ========================================================= */
    async function adicionarOcorrencia(data, colaboradorId, motivo) {
        mostrarStatus('Salvando...', 'normal');

        if (!supabase) {
            // Modo offline: salvar localmente e enfileirar
            const idTemp = Date.now();
            ocorrencias.push({ id: idTemp, data, colaboradorId, motivo });
            filaSincronizacao.push({ tipo: 'inserir_ocorrencia', idTemp, data, colaboradorId, motivo });
            salvarFilaSync();
            salvarDadosLocal();
            renderizarTudo();
            mostrarStatus('Salvo localmente (offline)', 'offline');
            return;
        }

        try {
            const { data: nova, error } = await supabase
                .from('ocorrencias')
                .insert([{ data, colaborador_id: colaboradorId, motivo }])
                .select()
                .single();

            if (error) throw error;

            ocorrencias.push({
                id:            nova.id,
                data:          nova.data,
                colaboradorId: nova.colaborador_id,
                motivo:        nova.motivo
            });

            salvarDadosLocal();
            renderizarTudo();
            mostrarStatus('Ausência registrada!', 'online');

        } catch (error) {
            console.error('Erro ao salvar ausência:', error);
            // Fallback offline
            const idTemp = Date.now();
            ocorrencias.push({ id: idTemp, data, colaboradorId, motivo });
            filaSincronizacao.push({ tipo: 'inserir_ocorrencia', idTemp, data, colaboradorId, motivo });
            salvarFilaSync();
            salvarDadosLocal();
            renderizarTudo();
            mostrarStatus('Salvo localmente — sincronizará quando online', 'offline');
        }
    }

    async function excluirOcorrencia(id) {
        ocorrencias = ocorrencias.filter(o => o.id !== id);
        salvarDadosLocal();
        renderizarTudo();

        if (!supabase) {
            filaSincronizacao.push({ tipo: 'excluir_ocorrencia', id });
            salvarFilaSync();
            mostrarStatus('Excluído localmente (offline)', 'offline');
            return;
        }

        try {
            const { error } = await supabase.from('ocorrencias').delete().eq('id', id);
            if (error) throw error;
            mostrarStatus('Ausência excluída!', 'online');
        } catch (error) {
            console.error('Erro ao excluir:', error);
            filaSincronizacao.push({ tipo: 'excluir_ocorrencia', id });
            salvarFilaSync();
            mostrarStatus('Exclusão pendente de sincronização', 'offline');
        }
    }

    /* =========================================================
       COLABORADORES — CRUD
    ========================================================= */
    async function adicionarColaborador(nome, cor) {
        mostrarStatus('Salvando colaborador...', 'normal');

        if (!supabase) {
            const novoId = (Math.max(0, ...colaboradores.map(c => c.id)) + 1);
            colaboradores.push({ id: novoId, nome, cor });
            salvarDadosLocal();
            renderizarTudo();
            mostrarStatus('Colaborador salvo localmente (offline)', 'offline');
            return;
        }

        try {
            const { data: novo, error } = await supabase
                .from('colaboradores')
                .insert([{ nome, cor }])
                .select()
                .single();

            if (error) throw error;

            colaboradores.push({ id: novo.id, nome: novo.nome, cor: novo.cor });
            salvarDadosLocal();
            renderizarTudo();
            mostrarStatus(`Colaborador "${nome}" salvo!`, 'online');

        } catch (error) {
            console.error('Erro ao salvar colaborador:', error);
            const novoId = (Math.max(0, ...colaboradores.map(c => c.id)) + 1);
            colaboradores.push({ id: novoId, nome, cor });
            salvarDadosLocal();
            renderizarTudo();
            mostrarStatus('Colaborador salvo localmente', 'offline');
        }
    }

    async function excluirColaborador(id) {
        if (colaboradores.length <= 1) {
            alert('Não é possível excluir o único colaborador.');
            return;
        }
        if (ocorrencias.some(occ => occ.colaboradorId === id)) {
            alert('Este colaborador possui ausências registradas.\nExclua as ausências antes de remover o colaborador.');
            return;
        }
        if (!confirm('Deseja excluir este colaborador?')) return;

        colaboradores = colaboradores.filter(c => c.id !== id);
        salvarDadosLocal();
        renderizarTudo();

        if (!supabase) {
            mostrarStatus('Excluído localmente (offline)', 'offline');
            return;
        }

        try {
            const { error } = await supabase.from('colaboradores').delete().eq('id', id);
            if (error) throw error;
            mostrarStatus('Colaborador excluído!', 'online');
        } catch (error) {
            console.error('Erro ao excluir colaborador:', error);
            mostrarStatus('Exclusão local — sincronizará quando online', 'offline');
        }
    }

    /* =========================================================
       UTILITÁRIOS DE CALENDÁRIO
    ========================================================= */
    function getDiasNoMes(ano, mes) {
        return new Date(ano, mes + 1, 0).getDate();
    }

    function getPrimeiroDia(ano, mes) {
        return new Date(ano, mes, 1).getDay();
    }

    function obterColaborador(id) {
        return colaboradores.find(c => c.id === id);
    }

    function getCorHex(cor) {
        const cores = {
            'colab-rosa':       '#e83e8c',
            'colab-verde':      '#28a745',
            'colab-laranja':    '#fd7e14',
            'colab-roxo':       '#6f42c1',
            'colab-vermelho':   '#dc3545',
            'colab-azul':       '#4a90c4',
            'colab-cinza':      '#6c757d',
            'colab-marrom':     '#8b5a2b',
            'colab-azul-claro': '#17a2b8'
        };
        return cores[cor] || '#999';
    }

    /* =========================================================
       RENDERIZAÇÃO — AGENDA
    ========================================================= */
    const MESES = [
        'Janeiro','Fevereiro','Março','Abril','Maio','Junho',
        'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'
    ];
    const DIAS_SEMANA = ['D','S','T','Q','Q','S','S'];

    function renderizarAgenda() {
        const container = document.getElementById('agendaMensal');
        container.innerHTML = '';

        for (let mes = 0; mes < 12; mes++) {
            const diasNoMes  = getDiasNoMes(anoAtual, mes);
            const primeiroDia = getPrimeiroDia(anoAtual, mes);

            const card = document.createElement('div');
            card.className = 'card-mes';
            card.innerHTML = `<div class="mes-titulo">${MESES[mes]} / ${anoAtual}</div>`;

            const diasGrid = document.createElement('div');
            diasGrid.className = 'dias-grid';
            diasGrid.setAttribute('role', 'grid');

            // Cabeçalho dos dias da semana
            DIAS_SEMANA.forEach(d => {
                const cab = document.createElement('div');
                cab.className = 'cabecalho-dia';
                cab.textContent = d;
                cab.setAttribute('role', 'columnheader');
                diasGrid.appendChild(cab);
            });

            // Células vazias antes do primeiro dia
            for (let i = 0; i < primeiroDia; i++) {
                const vazio = document.createElement('div');
                vazio.setAttribute('aria-hidden', 'true');
                diasGrid.appendChild(vazio);
            }

            // Células dos dias
            for (let dia = 1; dia <= diasNoMes; dia++) {
                const dataStr   = `${anoAtual}-${String(mes + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
                const ocorrDia  = ocorrencias.filter(occ => occ.data === dataStr);

                const celula = document.createElement('div');
                celula.className = 'dia-celula';
                celula.setAttribute('role', 'button');
                celula.setAttribute('tabindex', '0');
                celula.setAttribute('aria-label', `${dia} de ${MESES[mes]}, ${ocorrDia.length} ausência(s). Clique para adicionar.`);

                const numDiv = document.createElement('div');
                numDiv.className = 'numero-dia';
                numDiv.textContent = dia;
                celula.appendChild(numDiv);

                // Renderizar ocorrências do dia
                ocorrDia.forEach(occ => {
                    const colab   = obterColaborador(occ.colaboradorId);
                    const nome    = colab ? colab.nome : '?';
                    const corCss  = colab ? colab.cor  : 'colab-cinza';

                    const occDiv = document.createElement('div');
                    occDiv.className = `ocorrencia ${corCss}`;

                    const nomeSpan = document.createElement('span');
                    nomeSpan.className = 'ocorrencia-nome';
                    nomeSpan.textContent = nome;
                    nomeSpan.title = `${nome}: ${occ.motivo}`;

                    const btnRemover = document.createElement('button');
                    btnRemover.className = 'btn-remover';
                    btnRemover.textContent = '×';
                    btnRemover.setAttribute('aria-label', `Remover ausência de ${nome}`);
                    btnRemover.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (confirm(`Excluir ausência de ${nome} em ${dataStr}?`)) {
                            excluirOcorrencia(occ.id);
                        }
                    });

                    occDiv.addEventListener('click', e => e.stopPropagation());
                    occDiv.appendChild(nomeSpan);
                    occDiv.appendChild(btnRemover);
                    celula.appendChild(occDiv);
                });

                celula.addEventListener('click', () => abrirModalNovaOcorrencia(dataStr));
                celula.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        abrirModalNovaOcorrencia(dataStr);
                    }
                });

                diasGrid.appendChild(celula);
            }

            card.appendChild(diasGrid);
            container.appendChild(card);
        }
    }

    /* =========================================================
       RENDERIZAÇÃO — COLABORADORES E RESUMO
    ========================================================= */
    function renderizarColaboradores() {
        const container = document.getElementById('listaColaboradores');
        if (colaboradores.length === 0) {
            container.innerHTML = '<div class="vazio-msg">Nenhum colaborador. Clique em "+ Novo Colaborador".</div>';
            return;
        }
        container.innerHTML = '';
        colaboradores.forEach(colab => {
            const div = document.createElement('div');
            div.className = 'lista-item';
            div.innerHTML = `
                <div class="lista-item-nome">
                    <span class="quadrado-cor" style="background:${getCorHex(colab.cor)}" aria-hidden="true"></span>
                    <span>${colab.nome}</span>
                </div>
                <button class="btn-perigo" onclick="window.excluirColab(${colab.id})" aria-label="Excluir ${colab.nome}" style="padding:6px 12px; font-size:13px;">
                    Excluir
                </button>
            `;
            container.appendChild(div);
        });
    }

    function renderizarResumo() {
        const container = document.getElementById('resumoContagens');
        if (colaboradores.length === 0) {
            container.innerHTML = '<div class="vazio-msg">Nenhum dado disponível.</div>';
            return;
        }

        const contagem = {};
        colaboradores.forEach(c => { contagem[c.id] = 0; });
        ocorrencias.forEach(occ => {
            contagem[occ.colaboradorId] = (contagem[occ.colaboradorId] || 0) + 1;
        });

        container.innerHTML = '';
        // Ordenar por quantidade decrescente
        const ordenados = [...colaboradores].sort((a, b) => (contagem[b.id] || 0) - (contagem[a.id] || 0));
        ordenados.forEach(colab => {
            const qtd = contagem[colab.id] || 0;
            const div = document.createElement('div');
            div.className = 'lista-item';
            div.innerHTML = `
                <div class="lista-item-nome">
                    <span class="quadrado-cor" style="background:${getCorHex(colab.cor)}" aria-hidden="true"></span>
                    <span>${colab.nome}</span>
                </div>
                <span class="contador" aria-label="${qtd} ${qtd === 1 ? 'solicitação' : 'solicitações'}">
                    ${qtd} ${qtd === 1 ? 'solicitação' : 'solicitações'}
                </span>
            `;
            container.appendChild(div);
        });
    }

    function renderizarTudo() {
        renderizarAgenda();
        renderizarColaboradores();
        renderizarResumo();
    }

    /* =========================================================
       MODAL — GERENCIAMENTO
    ========================================================= */
    let _salvarHandler   = null;
    let _cancelarHandler = null;

    function abrirModal() {
        const modal = document.getElementById('modal');
        modal.classList.add('aberto');
        // Focar o primeiro campo interativo
        setTimeout(() => {
            const primeiro = modal.querySelector('input, select, textarea');
            if (primeiro) primeiro.focus();
        }, 100);
    }

    function fecharModal() {
        const modal = document.getElementById('modal');
        modal.classList.remove('aberto');
        if (_salvarHandler)   document.getElementById('modalSalvar').removeEventListener('click', _salvarHandler);
        if (_cancelarHandler) document.getElementById('modalCancelar').removeEventListener('click', _cancelarHandler);
        _salvarHandler   = null;
        _cancelarHandler = null;
    }

    function abrirModalNovaOcorrencia(data) {
        if (colaboradores.length === 0) {
            alert('Cadastre um colaborador primeiro!');
            return;
        }

        document.getElementById('modalTitulo').textContent = 'Nova Ausência';
        document.getElementById('modalCorpo').innerHTML = `
            <div class="form-group">
                <label for="modalData">Data</label>
                <input type="date" id="modalData" value="${data}" readonly>
            </div>
            <div class="form-group">
                <label for="modalColaborador">Colaborador</label>
                <select id="modalColaborador">
                    ${colaboradores.map(c => `<option value="${c.id}">${c.nome}</option>`).join('')}
                </select>
            </div>
            <div class="form-group">
                <label for="modalMotivo">Motivo</label>
                <textarea id="modalMotivo" rows="3" placeholder="Descreva o motivo da ausência..."></textarea>
            </div>
        `;

        _salvarHandler = () => {
            const colabId = parseInt(document.getElementById('modalColaborador').value);
            const motivo  = document.getElementById('modalMotivo').value.trim();
            if (!motivo) {
                alert('Por favor, informe o motivo da ausência.');
                document.getElementById('modalMotivo').focus();
                return;
            }
            fecharModal();
            adicionarOcorrencia(data, colabId, motivo);
        };

        _cancelarHandler = () => fecharModal();

        document.getElementById('modalSalvar').addEventListener('click', _salvarHandler);
        document.getElementById('modalCancelar').addEventListener('click', _cancelarHandler);
        abrirModal();
    }

    function abrirModalNovoColaborador() {
        const coresLista = [
            'colab-rosa','colab-verde','colab-laranja','colab-roxo','colab-vermelho',
            'colab-azul','colab-cinza','colab-marrom','colab-azul-claro'
        ];
        const nomesCores = {
            'colab-rosa':       'Rosa',
            'colab-verde':      'Verde',
            'colab-laranja':    'Laranja',
            'colab-roxo':       'Roxo',
            'colab-vermelho':   'Vermelho',
            'colab-azul':       'Azul',
            'colab-cinza':      'Cinza',
            'colab-marrom':     'Marrom',
            'colab-azul-claro': 'Azul Claro'
        };

        corSelecionada = 'colab-azul';

        document.getElementById('modalTitulo').textContent = 'Novo Colaborador';
        document.getElementById('modalCorpo').innerHTML = `
            <div class="form-group">
                <label for="modalNome">Nome</label>
                <input type="text" id="modalNome" placeholder="Nome completo" autocomplete="off" maxlength="60">
            </div>
            <div class="form-group">
                <label>Cor de identificação</label>
                <div class="cores-container" id="coresContainer" role="radiogroup" aria-label="Selecionar cor"></div>
            </div>
        `;

        const coresContainer = document.getElementById('coresContainer');
        coresLista.forEach(cor => {
            const div = document.createElement('div');
            div.className = `cor-opcao ${cor}${cor === 'colab-azul' ? ' selecionada' : ''}`;
            div.title = nomesCores[cor];
            div.setAttribute('role', 'radio');
            div.setAttribute('aria-checked', cor === 'colab-azul' ? 'true' : 'false');
            div.setAttribute('aria-label', nomesCores[cor]);
            div.setAttribute('tabindex', '0');
            div.addEventListener('click', () => {
                document.querySelectorAll('.cor-opcao').forEach(c => {
                    c.classList.remove('selecionada');
                    c.setAttribute('aria-checked', 'false');
                });
                div.classList.add('selecionada');
                div.setAttribute('aria-checked', 'true');
                corSelecionada = cor;
            });
            div.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    div.click();
                }
            });
            coresContainer.appendChild(div);
        });

        _salvarHandler = () => {
            const nome = document.getElementById('modalNome').value.trim();
            if (!nome) {
                alert('Por favor, informe o nome do colaborador.');
                document.getElementById('modalNome').focus();
                return;
            }
            fecharModal();
            adicionarColaborador(nome, corSelecionada);
        };

        _cancelarHandler = () => fecharModal();

        document.getElementById('modalSalvar').addEventListener('click', _salvarHandler);
        document.getElementById('modalCancelar').addEventListener('click', _cancelarHandler);
        abrirModal();
    }

    /* =========================================================
       EXPOSIÇÃO GLOBAL NECESSÁRIA PARA ONCLICK INLINE
    ========================================================= */
    window.excluirColab = (id) => excluirColaborador(id);

    /* =========================================================
       EVENT LISTENERS
    ========================================================= */
    document.getElementById('selecionarAno').addEventListener('change', (e) => {
        anoAtual = parseInt(e.target.value);
        renderizarAgenda();
    });

    document.getElementById('btnAtualizar').addEventListener('click', () => {
        anoAtual = parseInt(document.getElementById('selecionarAno').value);
        if (supabase) {
            carregarDados();
        } else {
            renderizarAgenda();
        }
    });

    document.getElementById('novoColaboradorBtn').addEventListener('click', abrirModalNovoColaborador);

    // Fechar modal ao clicar no overlay
    document.getElementById('modal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('modal')) fecharModal();
    });

    // Fechar modal com Escape
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && document.getElementById('modal').classList.contains('aberto')) {
            fecharModal();
        }
    });

    /* =========================================================
       REGISTRO DO SERVICE WORKER (PWA)
    ========================================================= */
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => {
                    console.log('[PWA] Service Worker registrado:', reg.scope);

                    // Notificar usuário quando há atualização disponível
                    reg.addEventListener('updatefound', () => {
                        const novoSW = reg.installing;
                        novoSW.addEventListener('statechange', () => {
                            if (novoSW.state === 'installed' && navigator.serviceWorker.controller) {
                                mostrarStatus('Nova versão disponível — recarregue a página', 'normal');
                            }
                        });
                    });
                })
                .catch(err => console.warn('[PWA] Falha ao registrar SW:', err));
        });
    }

    /* =========================================================
       INICIAR APLICAÇÃO
    ========================================================= */
    init();
</script>
</body>
</html>
